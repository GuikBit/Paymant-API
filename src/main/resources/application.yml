spring:
  application:
    name: payment-api

  profiles:
    active: dev

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

resilience4j:
  retry:
    instances:
      asaas:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
        ignoreExceptions:
          - br.com.holding.payments.integration.asaas.client.AsaasApiException
  circuitbreaker:
    instances:
      asaas:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
  timelimiter:
    instances:
      asaas:
        timeoutDuration: 15s

jasypt:
  encryptor:
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production-min-256-bits-key}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  asaas:
    base-url: ${ASAAS_BASE_URL:https://sandbox.asaas.com/api/v3}
    connect-timeout-ms: 3000
    read-timeout-ms: 10000
  subscription:
    max-overdue-charges: 3
    overdue-check-cron: "0 0 8 * * *"
  plan-change:
    scheduled-cron: "0 0 1 * * *"
  webhook:
    max-attempts: 10
    backoff-multiplier: 2
    processor-interval-ms: 3000
  outbox:
    relay-interval-ms: 5000
    max-attempts: 5
    webhook-url: ${OUTBOX_WEBHOOK_URL:}
  reconciliation:
    cron: "0 0 3 * * *"
    days-back: 3
  rate-limit:
    enabled: true
    requests-per-window: 100
    window-ms: 60000
