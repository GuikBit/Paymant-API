spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

  jpa:
    show-sql: false

logging:
  level:
    br.com.holding.payments: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  asaas:
    base-url: https://api.asaas.com/v3
  master-seed:
    enabled: ${MASTER_SEED_ENABLED:false}
    email: ${MASTER_SEED_EMAIL:}
    password: ${MASTER_SEED_PASSWORD:}
    name: ${MASTER_SEED_NAME:Master Admin}
    company-cnpj: ${MASTER_SEED_COMPANY_CNPJ:00000000000100}
    company-razao-social: ${MASTER_SEED_COMPANY_RAZAO_SOCIAL:Holding Master LTDA}
    company-nome-fantasia: ${MASTER_SEED_COMPANY_NOME_FANTASIA:Holding Master}
