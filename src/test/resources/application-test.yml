spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/payment_db
    username: payment_app
    password: ${DB_PASSWORD:dev_password}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  flyway:
    clean-disabled: false

app:
  jwt:
    secret: test-secret-key-for-unit-tests-minimum-256-bits-long-enough
    expiration-ms: 3600000
  asaas:
    base-url: http://localhost:8089
  cors:
    allowed-origins: "*"
  outbox:
    relay-interval-ms: 999999999
    max-attempts: 5
    webhook-url: ""
  rate-limit:
    enabled: false

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:test-jasypt-secret}
