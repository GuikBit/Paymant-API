services:

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: payment-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/payment_db
      DB_USERNAME: payment_app
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      MASTER_SEED_ENABLED: ${MASTER_SEED_ENABLED:-false}
      MASTER_SEED_EMAIL: ${MASTER_SEED_EMAIL:-}
      MASTER_SEED_PASSWORD: ${MASTER_SEED_PASSWORD:-}
      MASTER_SEED_NAME: ${MASTER_SEED_NAME:-Master Admin}
      MASTER_SEED_COMPANY_CNPJ: ${MASTER_SEED_COMPANY_CNPJ:-00000000000100}
      MASTER_SEED_COMPANY_RAZAO_SOCIAL: ${MASTER_SEED_COMPANY_RAZAO_SOCIAL:-Holding Master LTDA}
      MASTER_SEED_COMPANY_NOME_FANTASIA: ${MASTER_SEED_COMPANY_NOME_FANTASIA:-Holding Master}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payment_net

  postgres:
    image: postgres:16-alpine
    container_name: payment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - payment_net

  redis:
    image: redis:7-alpine
    container_name: payment-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - payment_net

volumes:
  postgres_data:
  redis_data:

networks:
  payment_net:
    driver: bridge
